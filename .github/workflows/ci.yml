name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-qa:
    name: Web QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Verify license positioning
        run: npm run license:positioning-check

      - name: Run guided flow regression guard
        run: npm run qa:guided-flow-check

      - name: Build web app
        run: npm run build

  release-smoke:
    name: Release metadata smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release metadata smoke
        run: npm run release:smoke

  release-review-guard:
    name: Release review guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release review docs/template alignment
        run: npm run release:review-check

  public-safety-check:
    name: Public safety check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate release-facing public safety
        run: npm run release:public-safety-check

  native-doctor:
    name: Native doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run native environment checks
        env:
          NOMETER_ROOT: ${{ github.workspace }}
          NOMETER_TEMP: ${{ github.workspace }}/tmp
          NOMETER_WORK_DIR: ${{ github.workspace }}/work
          NOMETER_SKIP_REQUIRED: "1"
        run: npm run native:doctor

      - name: Run OCR preflight planning check
        env:
          NOMETER_ROOT: ${{ github.workspace }}
          NOMETER_TOOLCHAIN_ROOT: ${{ github.workspace }}/toolchains
          NOMETER_TEMP: ${{ github.workspace }}/tmp
        run: npm run native:ocr-preflight

  ci-maintenance-check:
    name: CI maintenance check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate CI maintenance expectations
        run: npm run ci:maintenance-check

  first-release-check:
    name: First release readiness check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate first-release checklist/docs/template alignment
        run: npm run release:first-release-check
