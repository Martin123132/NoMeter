name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-qa:
    name: Web QA
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build web app
        run: npm run build

  release-smoke:
    name: Release metadata smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release metadata smoke
        run: npm run release:smoke

  native-doctor:
    name: Native doctor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run native environment checks
        env:
          OPENFORGE_ROOT: ${{ github.workspace }}
          OPENFORGE_TEMP: ${{ github.workspace }}/tmp
          OPENFORGE_WORK_DIR: ${{ github.workspace }}/work
          NOMETER_SKIP_REQUIRED: "1"
        run: npm run native:doctor
